name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build Release x64
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSINSTALL=%%i
          if not defined VSINSTALL (
            echo Visual Studio C++ toolchain not found.
            exit /b 1
          )
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          mkdir bin\Release
          mkdir obj\app
          mkdir obj\payload
          rc /nologo /fo obj\app\app.res src\app\app.rc
          if errorlevel 1 exit /b 1
          cl /nologo /std:c++17 /O2 /W4 /WX /wd4191 /permissive- /MT /EHsc /DUNICODE /D_UNICODE /DWIN32_LEAN_AND_MEAN /DNOMINMAX /Fo"obj\app\\" /Fe"bin\Release\FlipConfigBypass.exe" src\app\main.cpp obj\app\app.res /link /SUBSYSTEM:WINDOWS user32.lib shell32.lib comdlg32.lib gdi32.lib advapi32.lib /MANIFESTDEPENDENCY:"type='win32' name='Microsoft.Windows.Common-Controls' version='6.0.0.0' processorArchitecture='*' publicKeyToken='6595b64144ccf1df' language='*'"
          if errorlevel 1 exit /b 1
          mt /nologo -manifest bin\Release\FlipConfigBypass.exe.manifest -outputresource:bin\Release\FlipConfigBypass.exe;#1
          if errorlevel 1 exit /b 1
          del bin\Release\FlipConfigBypass.exe.manifest
          cl /nologo /std:c++17 /O2 /W4 /WX /wd4191 /permissive- /MT /EHsc /LD /DUNICODE /D_UNICODE /DWIN32_LEAN_AND_MEAN /DNOMINMAX /Fo"obj\payload\\" /Fe"bin\Release\FlipConfigPayload.dll" src\payload\payload.cpp /link /SUBSYSTEM:WINDOWS
          if errorlevel 1 exit /b 1
          dir bin\Release
          if not exist bin\Release\FlipConfigBypass.exe exit /b 1
          if not exist bin\Release\FlipConfigPayload.dll exit /b 1

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: FlipConfigBypass-x64
          path: |
            bin\Release\FlipConfigBypass.exe
            bin\Release\FlipConfigPayload.dll
          if-no-files-found: error
